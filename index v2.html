function hdr(token){return{apikey:AK,Authorization:`Bearer ${token||AK}`,"Content-Type":"application/json"}}
async function sbGet(t,p="",token){try{const r=await fetch(`${SB}/rest/v1/${t}?${p}`,{headers:hdr(token)});return r.ok?r.json():[];}catch{return[];}}
async function sbPost(t,body,token){try{const r=await fetch(`${SB}/rest/v1/${t}`,{method:"POST",headers:{...hdr(token),Prefer:"return=representation"},body:JSON.stringify(body)});return r.ok?r.json():null;}catch{return null;}}
async function sbDelete(t,p,token){try{await fetch(`${SB}/rest/v1/${t}?${p}`,{method:"DELETE",headers:hdr(token)});}catch{}}
async function sbRPC(fn,body,token){try{const r=await fetch(`${SB}/rest/v1/rpc/${fn}`,{method:"POST",headers:hdr(token),body:JSON.stringify(body)});return r.ok?r.json():[];}catch{return[];}}
async function sbAuth(action,email,password){
  const ep=action==='signup'?'/auth/v1/signup':'/auth/v1/token?grant_type=password';
  const r=await fetch(`${SB}${ep}`,{method:"POST",headers:{"Content-Type":"application/json",apikey:AK},body:JSON.stringify({email,password})});
  const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||d.message||'Chyba');return d;
}

// ═══ AUTH CONTEXT ═══
const AuthCtx=createContext(null);
function AuthProvider({children}){
  const[user,setUser]=useState(null);const[token,setToken]=useState(null);const[loading,setLoading]=useState(true);
  useEffect(()=>{const s=localStorage.getItem('klunk_session');if(s){try{const d=JSON.parse(s);setUser(d.user);setToken(d.access_token);}catch{}}setLoading(false);},[]);
  const login=async(email,pw)=>{const d=await sbAuth('login',email,pw);setUser(d.user);setToken(d.access_token);localStorage.setItem('klunk_session',JSON.stringify(d));};
  const signup=async(email,pw)=>{const d=await sbAuth('signup',email,pw);if(d.user&&d.access_token){setUser(d.user);setToken(d.access_token);localStorage.setItem('klunk_session',JSON.stringify(d));}return d;};
  const logout=()=>{setUser(null);setToken(null);localStorage.removeItem('klunk_session');};
  return <AuthCtx.Provider value={{user,token,loading,login,signup,logout}}>{children}</AuthCtx.Provider>;
}

// ═══ AUTH SCREEN ═══
function AuthScreen(){
  const{login,signup}=useContext(AuthCtx);
  const[mode,setMode]=useState('login');const[email,setEmail]=useState('');const[pw,setPw]=useState('');const[err,setErr]=useState('');const[msg,setMsg]=useState('');const[busy,setBusy]=useState(false);
  const submit=async()=>{
    setErr('');setMsg('');if(!email||!pw)return setErr('Vyplň email a heslo');if(pw.length<6)return setErr('Heslo musí mať aspoň 6 znakov');
    setBusy(true);try{
      if(mode==='login'){await login(email,pw);}
      else{const d=await signup(email,pw);if(!d.access_token)setMsg('Skontroluj email pre potvrdenie registrácie.');}
    }catch(e){setErr(e.message);}setBusy(false);
  };
  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 24px',background:K.bg,maxWidth:430,margin:'0 auto'}}>
      <div style={{width:56,height:56,borderRadius:14,background:K.accent,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:24}}><I name="wrench" size={28} color="#fff" sw={2.2}/></div>
      <div style={{fontSize:32,fontWeight:700,letterSpacing:-1,lineHeight:1.05,marginBottom:8}}>{mode==='login'?'Prihlásenie':'Registrácia'}</div>
      <div style={{fontSize:15,color:K.textMuted,marginBottom:32}}>{mode==='login'?'Vitaj späť v Klunk':'Vytvor si účet a začni diagnostikovať'}</div>
      <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" type="email" style={{width:'100%',height:52,borderRadius:14,border:`1px solid ${K.borderStrong}`,background:K.chip,color:K.text,padding:'0 16px',fontSize:15,marginBottom:12,outline:'none'}}/>
      <input value={pw} onChange={e=>setPw(e.target.value)} placeholder="Heslo" type="password" onKeyDown={e=>e.key==='Enter'&&submit()} style={{width:'100%',height:52,borderRadius:14,border:`1px solid ${K.borderStrong}`,background:K.chip,color:K.text,padding:'0 16px',fontSize:15,marginBottom:16,outline:'none'}}/>
      {err&&<div style={{color:K.danger,fontSize:13,marginBottom:12}}>{err}</div>}
      {msg&&<div style={{color:K.success,fontSize:13,marginBottom:12}}>{msg}</div>}
      <button onClick={submit} disabled={busy} style={{width:'100%',height:52,borderRadius:26,border:'none',background:K.accent,color:'#fff',fontSize:16,fontWeight:600,opacity:busy?0.6:1}}>{busy?'...':(mode==='login'?'Prihlásiť sa':'Vytvoriť účet')}</button>
      <button onClick={()=>{setMode(mode==='login'?'signup':'login');setErr('');setMsg('');}} style={{marginTop:16,background:'none',border:'none',color:K.textMuted,fontSize:14}}>{mode==='login'?'Nemáš účet? Registrovať sa':'Už máš účet? Prihlásiť sa'}</button>
    </div>
  );
}

// ═══ ADD CAR MODAL ═══
function AddCarModal({onClose,onAdd,token}){
  const[makes,setMakes]=useState([]);const[models,setModels]=useState([]);const[gens,setGens]=useState([]);const[engines,setEngines]=useState([]);
  const[make,setMake]=useState('');const[model,setModel]=useState('');const[gen,setGen]=useState('');const[vid,setVid]=useState('');
  const[allV,setAllV]=useState([]);const[allE,setAllE]=useState({});
  useEffect(()=>{
    (async()=>{
      const v=await sbGet("vehicles","select=*",token);const e=await sbGet("engines","select=*",token);
      const em={};(e||[]).forEach(x=>{em[x.id]=x;});setAllE(em);setAllV(v||[]);
      setMakes([...new Set((v||[]).map(x=>x.make))].sort());
    })();
  },[]);
  useEffect(()=>{if(make){const m=[...new Set(allV.filter(v=>v.make===make).map(v=>v.model))].sort();setModels(m);setModel('');setGen('');setVid('');setGens([]);setEngines([]);}else{setModels([])}},[make]);
  useEffect(()=>{if(model){const g=[...new Set(allV.filter(v=>v.make===make&&v.model===model).map(v=>v.generation))].sort();setGens(g);setGen('');setVid('');setEngines([]);}else{setGens([])}},[model]);
  useEffect(()=>{if(gen){const veh=allV.filter(v=>v.make===make&&v.model===model&&v.generation===gen);const seen=new Set();const engs=veh.filter(v=>{const k=v.engine_id;if(seen.has(k))return false;seen.add(k);return true;}).map(v=>({vid:v.id,engine:allE[v.engine_id]})).filter(x=>x.engine);setEngines(engs);setVid('');}else{setEngines([])}},[gen]);

  const selStyle={width:'100%',height:48,borderRadius:12,border:`1px solid ${K.borderStrong}`,background:K.chip,color:K.text,padding:'0 16px',fontSize:14,marginBottom:12,outline:'none',paddingRight:36};

  return(
    <div style={{position:'fixed',inset:0,zIndex:50,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:430,background:K.card,borderRadius:'24px 24px 0 0',padding:'24px 20px 40px',maxHeight:'85vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:20,fontWeight:700,color:K.text}}>Pridať auto</div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:18,background:K.chip,border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:K.text}}><I name="x" size={18}/></button>
        </div>
        <div style={{fontSize:13,color:K.textMuted,marginBottom:20}}>Vyber značku, model a motor. Podľa toho ti Klunk nájde presné chyby.</div>
        <select value={make} onChange={e=>setMake(e.target.value)} style={selStyle}><option value="">Značka</option>{makes.map(m=><option key={m} value={m}>{m}</option>)}</select>
        {make&&<select value={model} onChange={e=>setModel(e.target.value)} style={selStyle}><option value="">Model</option>{models.map(m=><option key={m} value={m}>{m}</option>)}</select>}
        {model&&<select value={gen} onChange={e=>setGen(e.target.value)} style={selStyle}><option value="">Generácia</option>{gens.map(g=><option key={g} value={g}>{g}</option>)}</select>}
        {gen&&engines.length>0&&<select value={vid} onChange={e=>setVid(e.target.value)} style={selStyle}><option value="">Motor</option>{engines.map(x=><option key={x.vid} value={x.vid}>{x.engine.code} · {x.engine.displacement_cc}cc · {x.engine.power_hp}hp · {x.engine.fuel_type==='petrol'?'Benzín':'Diesel'}</option>)}</select>}
        <button onClick={()=>{if(vid){const v=allV.find(x=>x.id===parseInt(vid));const e=allE[v.engine_id];onAdd({vehicle_id:parseInt(vid),make:v.make,model:v.model,generation:v.generation,engine_id:e.id,engine_code:e.code,engine_cc:e.displacement_cc,engine_hp:e.power_hp,fuel:e.fuel_type});}}} disabled={!vid} style={{width:'100%',height:52,borderRadius:26,border:'none',background:vid?K.accent:K.chip,color:vid?'#fff':K.textSubtle,fontSize:16,fontWeight:600,marginTop:8}}>Pridať auto</button>
      </div>
    </div>
  );
}

// ═══ MAIN APP ═══
function App(){
  const{user,token,loading:authLoading,logout}=useContext(AuthCtx);
  const[tab,setTab]=useState('home');
  const[screen,setScreen]=useState(null); // null=tab, 'diagnose','results','addcar','shops','obd'
  const[cars,setCars]=useState([]);const[activeCar,setActiveCar]=useState(null);
  const[results,setResults]=useState([]);const[history,setHistory]=useState([]);
  const[loadingData,setLoadingData]=useState(true);

  // Load user cars
  const loadCars=useCallback(async()=>{
    if(!token)return;
    const uc=await sbGet("user_cars","select=*,vehicles(*,engines(*))",token);
    const list=(uc||[]).map(c=>({
      id:c.id,vehicle_id:c.vehicle_id,make:c.vehicles.make,model:c.vehicles.model,generation:c.vehicles.generation,
      engine_id:c.vehicles.engines.id,engine_code:c.vehicles.engines.code,engine_cc:c.vehicles.engines.displacement_cc,
      engine_hp:c.vehicles.engines.power_hp,fuel:c.vehicles.engines.fuel_type,
    }));
    setCars(list);if(list.length>0&&!activeCar)setActiveCar(list[0]);
    setLoadingData(false);
  },[token]);

  const loadHistory=useCallback(async()=>{
    if(!token)return;
    const h=await sbGet("diagnosis_history","select=*&order=created_at.desc&limit=20",token);
    setHistory(h||[]);
  },[token]);

  useEffect(()=>{if(token){loadCars();loadHistory();} else setLoadingData(false);},[token]);

  async function addCar(car){
    await sbPost("user_cars",{user_id:user.id,vehicle_id:car.vehicle_id},token);
    await loadCars();setScreen(null);
  }
  async function removeCar(id){
    await sbDelete("user_cars",`id=eq.${id}`,token);
    const newCars=cars.filter(c=>c.id!==id);setCars(newCars);
    if(activeCar?.id===id)setActiveCar(newCars[0]||null);
  }

  async function handleResults(res){
    setResults(res);setScreen('results');
    if(res.length>0&&activeCar){
      // Auto-save to history (max 20)
      const count=history.length;
      if(count>=20){const oldest=history[history.length-1];await sbDelete("diagnosis_history",`id=eq.${oldest.id}`,token);}
      await sbPost("diagnosis_history",{
        user_id:user.id,vehicle_id:activeCar.vehicle_id,engine_id:activeCar.engine_id,
        symptoms:[],answers:{},top_fault_name:res[0].name_sk,top_fault_severity:res[0].severity,
        top_fault_score:res[0].suspicion_score,all_results:res,
      },token);
      loadHistory();
    }
  }

  if(authLoading||loadingData)return <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:K.bg}}><div style={{width:56,height:56,borderRadius:14,background:K.accent,display:'flex',alignItems:'center',justifyContent:'center'}}><I name="wrench" size={28} color="#fff" sw={2.2}/></div><div style={{fontSize:16,fontWeight:600}}>Načítavam...</div></div>;
  if(!user)return <AuthScreen/>;

  // ── Tab content ──
  const tabContent={
    home:(
      <div style={{flex:1,overflowY:'auto',paddingBottom:100}}>
        {/* Header */}
        <div style={{padding:'16px 20px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:40,height:40,borderRadius:12,background:K.accent,display:'flex',alignItems:'center',justifyContent:'center'}}><I name="wrench" size={20} color="#fff" sw={2.2}/></div>
            <div><div style={{fontSize:12,color:K.textMuted}}>Klunk AI</div><div style={{fontSize:15,fontWeight:600,letterSpacing:-0.2}}>Diagnostika</div></div>
          </div>
        </div>

        {/* Cars + Add */}
        <div style={{padding:'16px 16px 0'}}>

  // ── Diagnose screen ──
  function DiagnoseScreen(){
    const[step,setStep]=useState('categories');const[cats,setCats]=useState([]);const[syms,setSyms]=useState([]);
    const[sel,setSel]=useState([]);const[ans,setAns]=useState({});const[qi,setQi]=useState(0);const[msgs,setMsgs]=useState([]);
    const ref=useRef(null);
    useEffect(()=>{ref.current?.scrollIntoView({behavior:'smooth'});},[msgs,step,syms]);
    useEffect(()=>{sbGet("symptom_categories","order=display_order",token).then(c=>{setCats(c||[]);setMsgs([{f:'ai',t:`Čo robí tvoje ${activeCar.make} ${activeCar.model} ${activeCar.generation}?`}]);});},[]);

    async function pickCat(c){setMsgs(m=>[...m,{f:'u',t:c.name_sk},{f:'ai',t:'Vyber konkrétne príznaky. Môžeš vybrať viacero.'}]);
      const it=await sbGet("symptom_category_items",`select=symptom_id,symptoms(id,slug,name_sk)&category_id=eq.${c.id}`,token);
      setSyms((it||[]).map(i=>({v:i.symptoms.slug,l:i.symptoms.name_sk})));setStep('symptoms');}
    function togSym(s){setSel(p=>p.includes(s.v)?p.filter(x=>x!==s.v):[...p,s.v]);}
    function confirmSym(){const n=syms.filter(s=>sel.includes(s.v)).map(s=>s.l);setMsgs(m=>[...m,{f:'u',t:n.join(', ')},{f:'ai',t:'Ďakujem. Ešte pár otázok.'},{f:'ai',t:QS[0].q}]);setStep('questions');setQi(0);}
    async function answerQ(a){const na={...ans,[QS[qi].id]:a};setAns(na);setMsgs(m=>[...m,{f:'u',t:a}]);
      if(qi+1<QS.length){setQi(qi+1);setMsgs(m=>[...m,{f:'ai',t:QS[qi+1].q}]);}
      else{setStep('loading');const r=await sbRPC("rank_faults_for_diagnosis",{p_engine_id:activeCar.engine_id,p_symptom_slugs:sel,p_answers:na},token);handleResults(r||[]);}}

    const total=2+QS.length;const cur=step==='categories'?1:step==='symptoms'?2:step==='questions'?3+qi:total;
    return(
      <div style={{flex:1,display:'flex',flexDirection:'column'}}>
        <div style={{padding:'16px 20px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <button onClick={()=>setScreen(null)} style={{width:36,height:36,borderRadius:18,background:K.chip,border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:K.text}}><I name="chevronLeft" size={18}/></button>
          <div style={{fontSize:17,fontWeight:600,letterSpacing:-0.3}}>Nová diagnóza</div>
          <button onClick={()=>setScreen(null)} style={{width:36,height:36,borderRadius:18,background:K.chip,border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:K.textMuted}}><I name="x" size={18}/></button>
        </div>
        <div style={{padding:'0 20px 16px',display:'flex',gap:4}}>{Array.from({length:total}).map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<cur?K.accent:K.chip}}/>)}</div>
        <div style={{flex:1,overflowY:'auto',padding:'0 16px 16px'}}>
          {msgs.map((m,i)=><div key={i} style={{display:'flex',flexDirection:m.f==='ai'?'row':'row-reverse',gap:10,marginBottom:12,alignItems:'flex-end'}}>
            {m.f==='ai'&&<div style={{width:28,height:28,borderRadius:8,background:K.accentSoft,display:'flex',alignItems:'center',justifyContent:'center',color:K.accent,flexShrink:0}}><I name="sparkle" size={14} sw={2.2}/></div>}
            <div style={{maxWidth:'80%',padding:'10px 14px',fontSize:14,lineHeight:1.4,background:m.f==='ai'?K.chip:K.accent,color:m.f==='ai'?K.text:'#fff',borderRadius:18,borderBottomLeftRadius:m.f==='ai'?6:18,borderBottomRightRadius:m.f==='ai'?18:6}}>{m.t}</div>
          </div>)}
          {step==='categories'&&cats.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:8,paddingLeft:38,marginTop:4}}>{cats.map(c=><button key={c.slug} onClick={()=>pickCat(c)} style={{padding:'10px 16px',borderRadius:20,border:`1px solid ${K.borderStrong}`,background:K.chip,color:K.text,fontSize:14,fontWeight:500}}>{c.name_sk}</button>)}</div>}
          {step==='symptoms'&&syms.length>0&&<div style={{paddingLeft:38,marginTop:4}}><div style={{display:'flex',flexWrap:'wrap',gap:8}}>{syms.map(s=>{const on=sel.includes(s.v);return<button key={s.v} onClick={()=>togSym(s)} style={{padding:'10px 16px',borderRadius:20,border:on?`2px solid ${K.accent}`:`1px solid ${K.borderStrong}`,background:on?K.accent:K.chip,color:on?'#fff':K.text,fontSize:14,fontWeight:500}}>{s.l}</button>})}</div>{sel.length>0&&<button onClick={confirmSym} style={{marginTop:16,width:'100%',padding:'14px',borderRadius:28,border:'none',background:K.accent,color:'#fff',fontSize:15,fontWeight:600}}>Pokračovať →</button>}</div>}
          {step==='questions'&&<div style={{paddingLeft:38,marginTop:4}}><div style={{display:'flex',flexDirection:'column',gap:8}}>{QS[qi].opts.map(o=><button key={o} onClick={()=>answerQ(o)} style={{padding:'14px 16px',borderRadius:16,border:`1px solid ${K.borderStrong}`,background:'transparent',color:K.text,fontSize:14,fontWeight:500,textAlign:'left'}}>{o}</button>)}</div></div>}
          {step==='loading'&&<div style={{textAlign:'center',padding:30,color:K.textMuted}}><div style={{fontSize:28}}>⚙️</div><div style={{marginTop:8,fontSize:14}}>Analyzujem...</div></div>}
          <div ref={ref}/>
        </div>
      </div>
    );
  }

            <div style={{width:44,height:44,borderRadius:12,background:K.chip,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I name="gauge" size={20}/></div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:15,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name_sk}</div><div style={{fontSize:12,color:K.textMuted,marginTop:2}}>{rs.l||''} · {r.estimated_cost_shop?r.estimated_cost_shop+'€':''}</div></div>

  // ── OBD ──
  function OBDScreen(){
    const[code,setCode]=useState('');const[result,setResult]=useState(null);const[searching,setSearching]=useState(false);
    async function search(){if(!code)return;setSearching(true);
      const dtcs=await sbGet("fault_dtcs",`select=*,faults(*)&dtc_code=eq.${code.toUpperCase()}`,token);
      setResult(dtcs&&dtcs.length>0?dtcs:null);setSearching(false);
    }
    return(
      <div style={{flex:1,overflowY:'auto',paddingBottom:40}}>
        <div style={{padding:'16px 20px 12px',display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setScreen(null)} style={{width:36,height:36,borderRadius:18,background:K.chip,border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:K.text}}><I name="chevronLeft" size={18}/></button>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:-0.5}}>OBD kód</div>
        </div>
        <div style={{padding:'0 16px'}}>
          <div style={{fontSize:14,color:K.textMuted,marginBottom:16}}>Zadaj chybový kód z OBD čítačky a Klunk ti povie, čo znamená.</div>
          <div style={{display:'flex',gap:8}}>
            <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="napr. P0401" onKeyDown={e=>e.key==='Enter'&&search()} style={{flex:1,height:48,borderRadius:14,border:`1px solid ${K.borderStrong}`,background:K.chip,color:K.text,padding:'0 16px',fontSize:16,fontFamily:'monospace',outline:'none',letterSpacing:1}}/>
            <button onClick={search} disabled={searching} style={{height:48,padding:'0 20px',borderRadius:14,border:'none',background:K.accent,color:'#fff',fontSize:15,fontWeight:600}}>{searching?'...':'Hľadať'}</button>
          </div>
          {result&&result.length>0&&<div style={{marginTop:20,display:'flex',flexDirection:'column',gap:10}}>
            {result.map((d,i)=>{const f=d.faults;const sv=sevMap[f.severity]||{};return(
              <div key={i} style={{background:K.card,border:`1px solid ${K.border}`,borderRadius:18,padding:16}}>
                <div style={{fontSize:11,fontWeight:700,color:K.accent,letterSpacing:0.4,textTransform:'uppercase',marginBottom:4}}>Kód {d.dtc_code} · váha {d.weight}/10</div>
                <div style={{fontSize:17,fontWeight:700}}>{f.name_sk}</div>
                <div style={{fontSize:13,color:K.textMuted,marginTop:4,lineHeight:1.4}}>{f.customer_description}</div>
                {sv.l&&<div style={{marginTop:10,display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:16,background:(sv.c||'')+'18',color:sv.c,fontSize:12,fontWeight:600}}>{sv.i} {sv.l}</div>}
              </div>
            );})}
          </div>}
          {result===null&&code&&!searching&&<div style={{marginTop:20,padding:20,background:K.card,border:`1px solid ${K.border}`,borderRadius:18,textAlign:'center',color:K.textMuted}}>Kód {code} sa nenašiel v databáze.</div>}
        </div>
      </div>
    );
  }

  // ── Render ──
  return(
    <div style={{height:'100%',maxWidth:430,margin:'0 auto',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',background:K.bg}}>
      {screen==='diagnose'&&activeCar?<DiagnoseScreen/>:
       screen==='results'?<ResultsScreen/>:
       screen==='shops'?<ShopsScreen/>:
       screen==='obd'?<OBDScreen/>:
       tabContent[tab]}
      {screen==='addcar'&&<AddCarModal onClose={()=>setScreen(null)} onAdd={addCar} token={token}/>}
      {!screen&&<div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:430,margin:'0 auto',background:'rgba(11,11,12,0.88)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderTop:`1px solid ${K.border}`,padding:'8px 12px 28px',display:'flex',justifyContent:'space-around',zIndex:30}}>
        {[{k:'home',icon:'home',l:'Domov'},{k:'diagnose',icon:'sparkle',l:'Diagnóza'},{k:'history',icon:'history',l:'História'},{k:'profile',icon:'user',l:'Profil'}].map(t=>{
          const on=tab===t.k;
          return <button key={t.k} onClick={()=>{if(t.k==='diagnose'&&activeCar){setScreen('diagnose');}else{setTab(t.k);setScreen(null);}}} style={{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:4,color:on?K.accent:K.textMuted}}>
            <I name={t.icon} size={22} sw={on?2:1.75}/><span style={{fontSize:10,fontWeight:on?700:500,letterSpacing:0.1}}>{t.l}</span>
          </button>;
        })}
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthProvider><App/></AuthProvider>);
</script>
</body>
</html>
