const hdrs = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json" };

async function sbGet(table, params = "") {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, { headers: hdrs });
    return r.ok ? r.json() : [];
  } catch { return []; }
}
async function sbRPC(fn, body) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, { method: "POST", headers: hdrs, body: JSON.stringify(body) });
    return r.ok ? r.json() : [];
  } catch { return []; }
}

// DIAGNOSE FLOW
// ═══════════════════════════════════════════════════
const QUESTIONS = [
  { id: 6, q: "Aká farba dymu ide z výfuku?", opts: ["Žiadny viditeľný dym", "Biely dym", "Čierny dym", "Modrý/sivý dym"] },
  { id: 1, q: "Kedy sa problém prejavuje?", opts: ["Za studena", "Za tepla", "Vždy", "Občas/náhodne"] },
  { id: 7, q: "Svieti kontrolka motora?", opts: ["Nesvieti", "Svieti stále", "Bliká", "Svietila a zhasla"] },
  { id: 3, q: "Nastal problém náhle alebo postupne?", opts: ["Náhle", "Postupne sa zhoršoval", "Neviem"] },
];

function DiagnoseScreen({ car, onBack, onResults }) {
  const [step, setStep] = React.useState('categories'); // categories, symptoms, questions, loading
  const [categories, setCategories] = React.useState([]);
  const [symptoms, setSymptoms] = React.useState([]);
  const [selected, setSelected] = React.useState([]);
  const [answers, setAnswers] = React.useState({});
  const [qIdx, setQIdx] = React.useState(0);
  const [messages, setMessages] = React.useState([]);
  const chatRef = React.useRef(null);

  React.useEffect(() => { chatRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, step, symptoms]);

  // Load categories on mount
  React.useEffect(() => {
    sbGet("symptom_categories", "order=display_order").then(cats => {
      setCategories(cats || []);
      setMessages([{ from: 'ai', text: `Čo robí tvoje ${car.make} ${car.model} ${car.generation}?` }]);
    });
  }, []);

  async function pickCategory(cat) {
    setMessages(m => [...m, { from: 'user', text: cat.name_sk }, { from: 'ai', text: 'Aké konkrétne príznaky pozoruješ? Vyber všetky, čo sedia.' }]);
    const items = await sbGet("symptom_category_items", `select=symptom_id,symptoms(id,slug,name_sk)&category_id=eq.${cat.id}`);
    setSymptoms((items || []).map(i => ({ value: i.symptoms.slug, label: i.symptoms.name_sk })));
    setStep('symptoms');
  }

  function toggleSymptom(s) {
    setSelected(p => p.includes(s.value) ? p.filter(x => x !== s.value) : [...p, s.value]);
  }

  function confirmSymptoms() {
    const names = symptoms.filter(s => selected.includes(s.value)).map(s => s.label);
    setMessages(m => [...m, { from: 'user', text: names.join(', ') }, { from: 'ai', text: 'Ďakujem. Ešte pár otázok pre presnejšiu diagnózu.' }]);
    setStep('questions');
    setQIdx(0);
  }

  async function answerQuestion(ans) {
    const newA = { ...answers, [QUESTIONS[qIdx].id]: ans };
    setAnswers(newA);
    setMessages(m => [...m, { from: 'user', text: ans }]);

    if (qIdx + 1 < QUESTIONS.length) {
      setQIdx(qIdx + 1);
    } else {
      setStep('loading');
      setMessages(m => [...m, { from: 'ai', text: 'Analyzujem údaje...' }]);
      const res = await sbRPC("rank_faults_for_diagnosis", {
        p_engine_id: car.engine_id,
        p_symptom_slugs: selected,
        p_answers: newA,
      });
      onResults(res || []);
    }
  }

  const totalSteps = 2 + QUESTIONS.length; // categories + symptoms + N questions
  const currentStep = step === 'categories' ? 1 : step === 'symptoms' ? 2 : step === 'questions' ? 3 + qIdx : totalSteps;
  const progress = currentStep / totalSteps;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: K.bg }}>
      {/* Nav */}
      <div style={{ padding: '16px 20px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button onClick={onBack} style={{ width: 36, height: 36, borderRadius: 18, background: K.chip, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: K.text }}>
          <Icon name="chevronLeft" size={18} />
        </button>
        <div style={{ fontSize: 17, fontWeight: 600, color: K.text, letterSpacing: -0.3 }}>Nová diagnóza</div>
        <button onClick={onBack} style={{ width: 36, height: 36, borderRadius: 18, background: K.chip, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: K.textMuted }}>
          <Icon name="x" size={18} />
        </button>
      </div>

      {/* Progress */}
      <div style={{ padding: '0 20px 16px', display: 'flex', gap: 4 }}>
        {Array.from({ length: totalSteps }).map((_, i) => (
          <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i < currentStep ? K.accent : K.chip }} />
        ))}
      </div>

      {/* Chat area */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 16px 16px' }}>
        {messages.map((msg, i) => (
          <div key={i} style={{ display: 'flex', flexDirection: msg.from === 'ai' ? 'row' : 'row-reverse', gap: 10, marginBottom: 12, alignItems: 'flex-end' }}>
            {msg.from === 'ai' && (
              <div style={{ width: 28, height: 28, borderRadius: 8, background: K.accentSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', color: K.accent, flexShrink: 0 }}>
                <Icon name="sparkle" size={14} strokeWidth={2.2} />
              </div>
            )}
            <div style={{
              maxWidth: '80%', padding: '10px 14px', fontSize: 14, lineHeight: 1.4,
              background: msg.from === 'ai' ? K.chip : K.accent,
              color: msg.from === 'ai' ? K.text : '#fff',
              borderRadius: 18,
              borderBottomLeftRadius: msg.from === 'ai' ? 6 : 18,
              borderBottomRightRadius: msg.from === 'ai' ? 18 : 6,
            }}>
              {msg.text}
            </div>
          </div>
        ))}

        {/* Category chips */}
        {step === 'categories' && categories.length > 0 && (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, paddingLeft: 38, marginTop: 4 }}>
            {categories.map(c => (
              <button key={c.slug} onClick={() => pickCategory(c)} style={{
                padding: '10px 16px', borderRadius: 20, border: `1px solid ${K.borderStrong}`,
                background: K.chip, color: K.text, fontSize: 14, fontWeight: 500,
                cursor: 'pointer', fontFamily: 'inherit',
              }}>{c.name_sk}</button>
            ))}
          </div>
        )}

        {/* Symptom multi-select */}
        {step === 'symptoms' && symptoms.length > 0 && (
          <div style={{ paddingLeft: 38, marginTop: 4 }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
              {symptoms.map(s => {
                const on = selected.includes(s.value);
                return (
                  <button key={s.value} onClick={() => toggleSymptom(s)} style={{
                    padding: '10px 16px', borderRadius: 20,
                    border: on ? `2px solid ${K.accent}` : `1px solid ${K.borderStrong}`,
                    background: on ? K.accent : K.chip,
                    color: on ? '#fff' : K.text,
                    fontSize: 14, fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit',
                  }}>{s.label}</button>
                );
              })}
            </div>
            {selected.length > 0 && (
              <button onClick={confirmSymptoms} style={{
                marginTop: 16, padding: '14px 32px', borderRadius: 28, border: 'none',
                background: K.accent, color: '#fff', fontSize: 15, fontWeight: 600,
                cursor: 'pointer', fontFamily: 'inherit', width: '100%',
              }}>Pokračovať →</button>
            )}
          </div>
        )}

        {/* Diagnostic questions */}
        {step === 'questions' && (
          <div style={{ paddingLeft: 38, marginTop: 4 }}>
            <div style={{ padding: '10px 14px', background: K.chip, borderRadius: 18, borderBottomLeftRadius: 6, marginBottom: 12, fontSize: 14, lineHeight: 1.4, color: K.text }}>
              {QUESTIONS[qIdx].q}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {QUESTIONS[qIdx].opts.map(o => (
                <button key={o} onClick={() => answerQuestion(o)} style={{
                  padding: '14px 16px', borderRadius: 16,
                  border: `1px solid ${K.borderStrong}`, background: 'transparent',
                  color: K.text, fontSize: 14, fontWeight: 500, cursor: 'pointer',
                  fontFamily: 'inherit', textAlign: 'left',
                }}>{o}</button>
              ))}
            </div>
          </div>
        )}

        {step === 'loading' && (
          <div style={{ textAlign: 'center', padding: 30, color: K.textMuted }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>⚙️</div>
            <div style={{ fontSize: 14 }}>Analyzujem...</div>
          </div>
        )}

        <div ref={chatRef} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// RESULTS SCREEN
// ═══════════════════════════════════════════════════
function ResultsScreen({ results, car, onBack }) {
  const top = results[0];
  if (!top) return null;
  const sev = sevMap[top.severity] || { label: String(top.severity), color: K.textMuted, icon: '?' };
  const diff = diffMap[top.diy_difficulty] || String(top.diy_difficulty);
  const dl = diffLevel[top.diy_difficulty] || 3;
  const maxScore = Math.max(...results.map(r => r.suspicion_score), 1);

  return (
    <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 100, background: K.bg }}>
      {/* Nav */}
      <div style={{ padding: '16px 20px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button onClick={onBack} style={{ width: 36, height: 36, borderRadius: 18, background: K.chip, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: K.text }}>
          <Icon name="chevronLeft" size={18} />
        </button>
        <div style={{ fontSize: 17, fontWeight: 600, color: K.text, letterSpacing: -0.3 }}>Diagnóza</div>
        <div style={{ width: 36 }} />
      </div>

      {/* Hero verdict */}
      <div style={{ padding: '4px 16px 0' }}>
        <div style={{ borderRadius: 22, padding: 20, background: K.card, border: `1px solid ${K.border}` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <div style={{ width: 22, height: 22, borderRadius: 6, background: K.accentSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', color: K.accent }}>
              <Icon name="sparkle" size={12} strokeWidth={2.2} />
            </div>
            <div style={{ fontSize: 11, fontWeight: 700, color: K.accent, letterSpacing: 0.4, textTransform: 'uppercase' }}>Klunk AI · Skóre {top.suspicion_score}</div>
          </div>
          <div style={{ fontSize: 24, fontWeight: 700, color: K.text, letterSpacing: -0.6, lineHeight: 1.1 }}>{top.name_sk}</div>
          <div style={{ fontSize: 14, color: K.textMuted, marginTop: 6, lineHeight: 1.45 }}>{top.customer_description}</div>

          {/* Severity badge */}
          <div style={{ marginTop: 14, display: 'inline-flex', alignItems: 'center', gap: 6, padding: '6px 12px', borderRadius: 20, background: sev.color + '18', color: sev.color, fontSize: 13, fontWeight: 600 }}>
            {sev.icon} {sev.label}
          </div>

          {/* All causes confidence */}
          <div style={{ marginTop: 18, display: 'flex', flexDirection: 'column', gap: 8 }}>
            {results.map((r, i) => (
              <div key={r.fault_id} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ flex: 1, fontSize: 13, color: i === 0 ? K.text : K.textMuted, fontWeight: i === 0 ? 600 : 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name_sk}</div>
                <div style={{ width: 80, height: 4, borderRadius: 2, background: K.chip, overflow: 'hidden', flexShrink: 0 }}>
                  <div style={{ height: '100%', width: `${(r.suspicion_score / maxScore) * 100}%`, background: i === 0 ? K.accent : K.textSubtle }} />
                </div>
                <div style={{ fontSize: 12, color: K.textMuted, fontFamily: 'ui-monospace, monospace', width: 30, textAlign: 'right', flexShrink: 0 }}>{r.suspicion_score}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* DIY card */}
      <div style={{ padding: '20px 20px 12px' }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: K.textMuted, letterSpacing: 0.3, textTransform: 'uppercase' }}>Zvládneš to sám?</div>
      </div>
      <div style={{ padding: '0 16px' }}>
        <div style={{ background: K.card, border: `1px solid ${K.border}`, borderRadius: 20, overflow: 'hidden' }}>
          <div style={{ padding: 16, display: 'flex', alignItems: 'flex-start', gap: 14 }}>
            <div style={{ width: 52, height: 52, borderRadius: 14, background: K.accentSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', color: K.accent, flexShrink: 0 }}>
              <Icon name="wrench" size={24} />
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: K.text, letterSpacing: -0.3 }}>{diff}</div>
                <DifficultyBars level={dl} />
              </div>
              <div style={{ fontSize: 13, color: K.textMuted, marginTop: 4, lineHeight: 1.4 }}>
                {dl <= 2 ? 'Zvládneš to doma so základným náradím.' : dl <= 3 ? 'Stredná náročnosť. Potrebuješ skúsenosti.' : 'Odporúčame zveriť servisnej dielni.'}
              </div>
            </div>
          </div>
          <div style={{ height: 1, background: K.border }} />
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr' }}>
            {top.estimated_cost_diy != null && (
              <div style={{ padding: '12px 16px', borderRight: `1px solid ${K.border}` }}>
                <div style={{ fontSize: 10, color: K.textMuted, fontWeight: 600, letterSpacing: 0.3, textTransform: 'uppercase' }}>Svojpomocne</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: K.text, letterSpacing: -0.4, marginTop: 2 }}>{top.estimated_cost_diy} €</div>
                <div style={{ fontSize: 11, color: K.textSubtle }}>len diely</div>
              </div>
            )}
            {top.estimated_cost_shop != null && (
              <div style={{ padding: '12px 16px' }}>
                <div style={{ fontSize: 10, color: K.textMuted, fontWeight: 600, letterSpacing: 0.3, textTransform: 'uppercase' }}>V servise</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: K.text, letterSpacing: -0.4, marginTop: 2 }}>{top.estimated_cost_shop} €</div>
                <div style={{ fontSize: 11, color: K.textSubtle }}>priemer v okolí</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Other faults */}
      {results.length > 1 && (
        <>
          <div style={{ padding: '24px 20px 12px' }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: K.textMuted, letterSpacing: 0.3, textTransform: 'uppercase' }}>Ďalšie možné príčiny</div>
          </div>
          <div style={{ padding: '0 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
            {results.slice(1).map((r, i) => {
              const rs = sevMap[r.severity] || {};
              return (
                <div key={r.fault_id} style={{ background: K.card, border: `1px solid ${K.border}`, borderRadius: 18, padding: 16, display: 'flex', alignItems: 'center', gap: 14 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: K.chip, display: 'flex', alignItems: 'center', justifyContent: 'center', color: K.text, flexShrink: 0 }}>
                    <Icon name="gauge" size={20} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 15, fontWeight: 600, color: K.text, letterSpacing: -0.2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{r.name_sk}</div>
                    <div style={{ fontSize: 12, color: K.textMuted, marginTop: 2 }}>
                      {rs.label || ''} · {r.estimated_cost_shop ? r.estimated_cost_shop + '€ servis' : ''}
                    </div>
                  </div>
                  <DifficultyBars level={diffLevel[r.diy_difficulty] || 3} />
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* New diagnosis button */}
      <div style={{ padding: '24px 16px 0' }}>
        <button onClick={onBack} style={{
          width: '100%', padding: 16, borderRadius: 28, border: `2px solid ${K.borderStrong}`,
          background: 'transparent', color: K.text, fontSize: 15, fontWeight: 600,
          cursor: 'pointer', fontFamily: 'inherit',
        }}>🔄 Nová diagnóza</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = React.useState('home');
  const [tab, setTab] = React.useState('home');
  const [cars, setCars] = React.useState([]);
  const [activeCar, setActiveCar] = React.useState(null);
  const [results, setResults] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    async function load() {
      const vehicles = await sbGet("vehicles", "select=*&limit=20");
      if (!vehicles || vehicles.length === 0) { setLoading(false); return; }
      const eids = [...new Set(vehicles.map(v => v.engine_id))];
      const engines = await sbGet("engines", `select=*&id=in.(${eids.join(",")})`);
      const emap = {}; (engines || []).forEach(e => { emap[e.id] = e; });
      const list = vehicles.filter(v => emap[v.engine_id]).map(v => ({
        id: v.id, make: v.make, model: v.model, generation: v.generation,
        engine_id: emap[v.engine_id].id, engine_code: emap[v.engine_id].code,
        engine_displacement_cc: emap[v.engine_id].displacement_cc,
        engine_power_hp: emap[v.engine_id].power_hp,
        fuel_type: emap[v.engine_id].fuel_type,
      }));
      const seen = new Set();
      const unique = list.filter(c => { const k = `${c.make}-${c.model}-${c.generation}-${c.engine_code}`; if (seen.has(k)) return false; seen.add(k); return true; });
      setCars(unique);
      if (unique.length > 0) setActiveCar(unique[0]);
      setLoading(false);
    }
    load();
  }, []);

  function handleDiagnose() { setScreen('diagnose'); }
  function handleResults(r) { setResults(r); setScreen('results'); }
  function handleBack() { setScreen('home'); setTab('home'); }

  if (loading) return (
    <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
      <KlunkLogo size={64} />
      <div style={{ fontSize: 16, fontWeight: 600, color: K.text }}>Načítavam...</div>
    </div>
  );

  return (
    <div style={{ height: '100%', maxWidth: 430, margin: '0 auto', display: 'flex', flexDirection: 'column', position: 'relative', overflow: 'hidden', background: K.bg }}>
      {screen === 'home' && <HomeScreen cars={cars} activeCar={activeCar} setActiveCar={setActiveCar} onDiagnose={handleDiagnose} />}
      {screen === 'diagnose' && activeCar && <DiagnoseScreen car={activeCar} onBack={handleBack} onResults={handleResults} />}
      {screen === 'results' && <ResultsScreen results={results} car={activeCar} onBack={handleBack} />}
      {screen === 'home' && <TabBar active={tab} onChange={setTab} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
