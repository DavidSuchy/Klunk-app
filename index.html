function AuthProvider({children}){const[user,setUser]=useState(null);const[token,setToken]=useState(null);const[rToken,setRToken]=useState(null);const[loading,setLoading]=useState(true);const refresh=useCallback(async(rt)=>{try{const r=await fetch(SB+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{"Content-Type":"application/json",apikey:AK},body:JSON.stringify({refresh_token:rt})});if(!r.ok)throw 0;const d=await r.json();setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);localStorage.setItem("klunk_session",JSON.stringify(d));return d.access_token;}catch{setUser(null);setToken(null);setRToken(null);localStorage.removeItem("klunk_session");return null;}},[]);useEffect(()=>{const s=localStorage.getItem("klunk_session");if(s){try{const d=JSON.parse(s);setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);if(d.refresh_token)refresh(d.refresh_token);}catch{}}setLoading(false);},[]);useEffect(()=>{if(!rToken)return;const i=setInterval(()=>refresh(rToken),50*60*1000);return()=>clearInterval(i);},[rToken]);const login=async(e,p)=>{const r=await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json",apikey:AK},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||"Chyba");setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);localStorage.setItem("klunk_session",JSON.stringify(d));};const signup=async(e,p)=>{const r=await fetch(SB+"/auth/v1/signup",{method:"POST",headers:{"Content-Type":"application/json",apikey:AK},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||"Chyba");if(d.access_token){setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);localStorage.setItem("klunk_session",JSON.stringify(d));}return d;};const logout=()=>{setUser(null);setToken(null);setRToken(null);localStorage.removeItem("klunk_session");};r {res.length>1&&<><div style={{padding:"24px 20px 12px"}}><div style={{fontSize:13,fontWeight:600,color:K.textMuted,letterSpacing:0.3,textTransform:"uppercase"}}>Ďalšie možné príčiny</div></div><div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:8}}>{res.slice(1).map(r=>{const rs=sevMap[r.severity]||{};return(<div key={r.fault_id} style={{background:K.card,border:"1px solid "+K.border,borderRadius:18,padding:16,display:"flex",alignItems:"center",gap:14}}><div style={{width:44,height:44,borderRadius:12,background:K.chip,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><I name="gauge" size={20}/></div><div style={{flex:1,minWidth:0}}><div style={{fontSize:15,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.name_sk}</div><div style={{fontSize:12,color:K.textMuted,marginTop:2}}>{rs.l||""} · {r.estimated_cost_shop?r.estimated_cost_shop+"€":""}</div></div><DiffBars level={diffLvl[r.diy_difficulty]||3}/></div>)})}</div></>}

function ShopScr(){return(<div style={{flex:1,overflowY:"auto",paddingBottom:40}}><div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",gap:12}}><button onClick={()=>setScr(null)} style={{width:36,height:36,borderRadius:18,background:K.chip,border:"none",display:"flex",alignItems:"center",justifyContent:"center",color:K.text}}><I name="chevronLeft" size={18}/></button><div style={{fontSize:20,fontWeight:700,letterSpacing:-0.5}}>Servisy v Košiciach</div></div><div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:10}}>{SHOPS.map((s,i)=>(<div key={i} style={{background:K.card,border:"1px solid "+K.border,borderRadius:20,padding:16}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><div style={{fontSize:16,fontWeight:700}}>{s.name}</div>{s.tag&&<div style={{fontSize:10,fontWeight:700,color:K.accent,background:K.accentSoft,borderRadius:4,padding:"2px 6px"}}>{s.tag}</div>}</div><div style={{fontSize:13,color:K.textMuted}}>{s.addr}</div><div style={{fontSize:12,color:K.textMuted,display:"flex",gap:6,marginTop:6,alignItems:"center"}}><span style={{color:K.warning}}>★ {s.rating}</span><span style={{opacity:.5}}>·</span><span>{s.reviews} recenzií</span><span style={{opacity:.5}}>·</span><span>{s.dist}</span></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12}}><div style={{fontSize:14,fontWeight:700}}>{s.price} · <span style={{color:K.accent}}>{s.time}</span></div><button style={{padding:"8px 16px",borderRadius:20,border:"none",background:K.accent,color:"#fff",fontSize:13,fontWeight:600}}>Kontakt</button></div></div>))}</div></div>);}
function OBDScr(){const[code,setCode]=useState("");const[result,setResult]=useState(null);const[srch,setSrch]=useState(false);async function search(){if(!code)return;setSrch(true);const d=await sbGet("fault_dtcs","select=*,faults(*)&dtc_code=eq."+code.toUpperCase(),token);setResult(d&&d.length>0?d:null);setSrch(false);}return(<div style={{flex:1,overflowY:"auto",paddingBottom:40}}><div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",gap:12}}><button onClick={()=>setScr(null)} style={{width:36,height:36,borderRadius:18,background:K.chip,border:"none",display:"flex",alignItems:"center",justifyContent:"center",color:K.text}}><I name="chevronLeft" size={18}/></button><div style={{fontSize:20,fontWeight:700,letterSpacing:-0.5}}>OBD kód</div></div><div style={{padding:"0 16px"}}><div style={{fontSize:14,color:K.textMuted,marginBottom:16}}>Zadaj chybový kód z OBD čítačky.</div><div style={{display:"flex",gap:8}}><input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="napr. P0401" onKeyDown={e=>e.key==="Enter"&&search()} style={{flex:1,height:48,borderRadius:14,border:"1px solid "+K.borderStrong,background:K.chip,color:K.text,padding:"0 16px",fontSize:16,fontFamily:"monospace",outline:"none",letterSpacing:1}}/><button onClick={search} disabled={srch} style={{height:48,padding:"0 20px",borderRadius:14,border:"none",background:K.accent,color:"#fff",fontSize:15,fontWeight:600}}>{srch?"...":"Hľadať"}</button></div>{result&&result.length>0&&<div style={{marginTop:20,display:"flex",flexDirection:"column",gap:10}}>{result.map((d,i)=>{const f=d.faults;const sv=sevMap[f.severity]||{};return(<div key={i} style={{background:K.card,border:"1px solid "+K.border,borderRadius:18,padding:16}}><div style={{fontSize:11,fontWeight:700,color:K.accent,letterSpacing:0.4,textTransform:"uppercase",marginBottom:4}}>Kód {d.dtc_code} · váha {d.weight}/10</div><div style={{fontSize:17,fontWeight:700}}>{f.name_sk}</div><div style={{fontSize:13,color:K.textMuted,marginTop:4,lineHeight:1.4}}>{f.customer_description}</div>{sv.l&&<div style={{marginTop:10,display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:16,background:(sv.c||"")+"18",color:sv.c,fontSize:12,fontWeight:600}}>{sv.i} {sv.l}</div>}</div>)})}</div>}{result===null&&code&&!srch&&<div style={{marginTop:20,padding:20,background:K.card,border:"1px solid "+K.border,borderRadius:18,textAlign:"center",color:K.textMuted}}>Kód {code} sa nenašiel.</div>}</div></div>);}
