// Capture ?ref=<code> on first visit and stash it so a future signup can attribute it.

(function captureRefOnLoad(){try{const u=new URL(window.location.href);const r=u.searchParams.get("ref");if(r&&!localStorage.getItem("klunk_ref")){localStorage.setItem("klunk_ref",r.slice(0,32));localStorage.setItem("klunk_ref_at",new Date().toISOString());}}catch{}})();

const DEV_PREVIEW_TUTORIALS=true;
async function loadTutorialForFault(faultId,engineId,token){const ftRes=await sbGet("fault_tutorials","select=tutorial_id,is_primary&fault_id=eq."+faultId,token);if(!ftRes||!ftRes.length)return null;const tutIds=ftRes.map(x=>x.tutorial_id);const statusFilter=DEV_PREVIEW_TUTORIALS?"":"&status=eq.live";const tuts=await sbGet("tutorials","select=*&id=in.("+tutIds.join(",")+")"+statusFilter,token);if(!tuts||!tuts.length)return null;const primary=ftRes.find(x=>x.is_primary)?.tutorial_id;const tut=tuts.find(t=>t.id===primary)||tuts[0];const[steps,engineNote]=await Promise.all([sbGet("tutorial_steps","select=*&tutorial_id=eq."+tut.id+"&order=step_number.asc",token),sbGet("tutorial_engines","select=notes_sk,fit&tutorial_id=eq."+tut.id+"&engine_id=eq."+engineId,token)]);return{...tut,steps:steps||[],engineNote:engineNote&&engineNote[0]||null};}
// Loads a single tutorial by its ID — used by the "DIY návody (test)" browse list on Home.
// engineId is optional: if user has an active car we fetch its engine-specific note, else null.
async function loadTutorialById(tutorialId,engineId,token){const tuts=await sbGet("tutorials","select=*&id=eq."+tutorialId,token);if(!tuts||!tuts.length)return null;const tut=tuts[0];const stepsP=sbGet("tutorial_steps","select=*&tutorial_id=eq."+tut.id+"&order=step_number.asc",token);const noteP=engineId?sbGet("tutorial_engines","select=notes_sk,fit&tutorial_id=eq."+tut.id+"&engine_id=eq."+engineId,token):Promise.resolve([]);const[steps,engineNote]=await Promise.all([stepsP,noteP]);return{...tut,steps:steps||[],engineNote:engineNote&&engineNote[0]||null};}

// Returns ALL tutorials linked to a fault (lightweight metadata only — no steps/warnings).
// Ordered: primary first, then by attempt_order ('first_attempt' before 'fallback').
// Used to render dual-CTA on the results screen when a fault has multiple tutorials (e.g. EGR cleaning + replacement).
async function loadAllTutorialsForFault(faultId,token){const ftRes=await sbGet("fault_tutorials","select=tutorial_id,is_primary,attempt_order&fault_id=eq."+faultId,token);if(!ftRes||!ftRes.length)return[];const tutIds=ftRes.map(x=>x.tutorial_id);const statusFilter=DEV_PREVIEW_TUTORIALS?"":"&status=eq.live";const tuts=await sbGet("tutorials","select=id,slug,title_sk,subtitle_sk,difficulty,difficulty_score,estimated_minutes,status&id=in.("+tutIds.join(",")+")"+statusFilter,token);if(!tuts||!tuts.length)return[];const orderRank=ao=>ao==="first_attempt"?0:ao==="only"?1:ao==="fallback"?2:3;return tuts.map(t=>{const link=ftRes.find(x=>x.tutorial_id===t.id)||{};return{...t,is_primary:!!link.is_primary,attempt_order:link.attempt_order};}).sort((a,b)=>(b.is_primary-a.is_primary)||(orderRank(a.attempt_order)-orderRank(b.attempt_order)));}
const AuthCtx=createContext(null);
function AuthProvider({children}){const[user,setUser]=useState(null);const[token,setToken]=useState(null);const[rToken,setRToken]=useState(null);const[loading,setLoading]=useState(true);const refresh=useCallback(async(rt)=>{try{const r=await fetch(SB+"/auth/v1/token?grant_type=refresh_token",{method:"POST",headers:{"Content-Type":"application/json",apikey:AK},body:JSON.stringify({refresh_token:rt})});if(!r.ok)throw 0;const d=await r.json();setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);localStorage.setItem("klunk_session",JSON.stringify(d));return d.access_token;}catch{setUser(null);setToken(null);setRToken(null);localStorage.removeItem("klunk_session");return null;}},[]);useEffect(()=>{const s=localStorage.getItem("klunk_session");if(s){try{const d=JSON.parse(s);setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);if(d.refresh_token)refresh(d.refresh_token);}catch{}}setLoading(false);},[]);useEffect(()=>{if(!rToken)return;const i=setInterval(()=>refresh(rToken),50*60*1000);return()=>clearInterval(i);},[rToken]);const login=async(e,p)=>{const r=await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:{"Content-Type":"application/json",apikey:AK},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||"Chyba");setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);localStorage.setItem("klunk_session",JSON.stringify(d));};const signup=async(e,p)=>{const r=await fetch(SB+"/auth/v1/signup",{method:"POST",headers:{"Content-Type":"application/json",apikey:AK},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok)throw new Error(d.error_description||d.msg||"Chyba");if(d.access_token){setUser(d.user);setToken(d.access_token);setRToken(d.refresh_token);localStorage.setItem("klunk_session",JSON.stringify(d));}return d;};const logout=()=>{setUser(null);setToken(null);setRToken(null);localStorage.removeItem("klunk_session");};return <AuthCtx.Provider value={{user,token,loading,login,signup,logout}}>{children}</AuthCtx.Provider>;}
function FaultFb({top,fb,sendFb,K}){const given=fb[top.fault_id];const[rating,setRating]=useState(null);const[comment,setComment]=useState("");const[sending,setSending]=useState(false);const[needsComment,setNeedsComment]=useState(false);async function pickRating(rt){if(rt==="correct"){setSending(true);await sendFb(top.fault_id,top.name_sk,rt,null);setSending(false);}else{setRating(rt);setNeedsComment(true);}}async function submitWithComment(){setSending(true);await sendFb(top.fault_id,top.name_sk,rating,comment.trim()||null);setSending(false);}if(given)return(<div style={{background:K.card,border:"1px solid "+K.border,borderRadius:18,padding:16}}><div style={{fontSize:14,color:K.success,display:"flex",alignItems:"center",gap:8}}><I name="check" size={18} color={K.success}/>Ďakujeme za spätnú väzbu!</div></div>);if(needsComment)return(<div style={{background:K.card,border:"1px solid "+K.border,borderRadius:18,padding:16}}><div style={{fontSize:14,fontWeight:600,marginBottom:8}}>{rating==="wrong"?"Čo bolo v skutočnosti zlé?":"Čo sme vynechali?"}</div><div style={{fontSize:12,color:K.textMuted,marginBottom:10,lineHeight:1.4}}>Tvoj feedback nám pomôže zlepšiť diagnózu pre ďalších. Ak nevieš presne, kľudne preskoč.</div><textarea value={comment} onChange={e=>setComment(e.target.value.slice(0,500))} placeholder="napr. zaseknutý EGR, alebo turbo netesní..." rows={3} style={{width:"100%",boxSizing:"border-box",padding:"10px 12px",borderRadius:12,border:"1px solid "+K.borderStrong,background:K.bg,color:K.text,fontSize:13,fontFamily:"inherit",resize:"vertical",lineHeight:1.4,outline:"none"}}/><div style={{fontSize:10,color:K.textSubtle,textAlign:"right",marginTop:2,fontFamily:"monospace"}}>{comment.length}/500</div><div style={{display:"flex",gap:8,marginTop:10}}><button onClick={submitWithComment} disabled={sending} style={{flex:1,padding:12,borderRadius:12,border:"none",background:K.accent,color:"#fff",fontSize:13,fontWeight:600,opacity:sending?0.6:1}}>{sending?"...":"Odosl function App(){const{user,token,loading:al,logout}=useContext(AuthCtx);const{dark,toggle,K}=useK();const[tab,setTab]=useState("home");const[scr,setScr]=useState(null);const[cars,setCars]=useState([]);const[ac,setAc]=useState(null);const[res,setRes]=useState([]);const[hist,setHist]=useState([]);const[parts,setParts]=useState([]);const[ld,setLd]=useState(true);const[fb,setFb]=useState({});const[lastHistId,setLastHistId]=useState(null);const[tut,setTut]=useState(null);const[tutAvailable,setTutAvailable]=useState(false);const[tutOptions,setTutOptions]=useState([]);const[skill,setSkill]=useState(null);const[needsOnboarding,setNeedsOnboarding]=useState(false);const[onbStep,setOnbStep]=useState(1);const[onbSkill,setOnbSkill]=useState(null);const[exitFbShown,setExitFbShown]=useState(false);const[showExitPopup,setShowExitPopup]=useState(false);const[showReportModal,setShowReportModal]=useState(false);

const[tutFrom,setTutFrom]=useState("results");
async function openTutorialById(tutorialId){const t=await loadTutorialById(tutorialId,ac?.engine_id,token);if(t){setTut(t);setTutFrom("tutlist");setScr("tutorial");}}
async function checkTutorial(faultId,engineId){const opts=await loadAllTutorialsForFault(faultId,token);setTutOptions(opts);setTutAvailable(opts.length>0);return opts;}
// Open a specific tutorial from the dual-CTA on the results screen (or single CTA if only one).
async function openTutorialFromOptions(tutorialId){const t=await loadTutorialById(tutorialId,ac?.engine_id,token);if(t){setTut(t);setTutFrom("results");setScr("tutorial");}}
async function openTutorial(faultId,engineId){let t=tut;if(!t||t.fault_check_id!==faultId){t=await loadTutorialForFault(faultId,engineId,token);if(t)t.fault_check_id=faultId;setTut(t);}if(t){setTutFrom("results");setScr("tutorial");}}
// Returns the outcome row's id so the feedback step can update it later (PATCH).
// outcome is required; wasHelpful + comment are optional and may be added in a follow-up update.
async function logTutorialOutcome(outcome,wasHelpful=null,comment=null){if(!tut)return null;const payload={user_id:user.id,tutorial_id:tut.id,diagnosis_history_id:lastHistId||null,user_car_id:ac?.id||null,outcome};if(wasHelpful!==null)payload.was_helpful=wasHelpful;if(comment)payload.notes_sk=comment.slice(0,500);const res=await sbPost("user_tutorial_outcomes",payload,token);return res&&res[0]&&res[0].id||null;}
// Updates an existing outcome row with feedback (thumbs + comment), called after the user picks them.
async function updateTutorialFeedback(outcomeId,wasHelpful,comment){if(!outcomeId)return;const payload={};if(wasHelpful!==null)payload.was_helpful=wasHelpful;if(comment!==null)payload.notes_sk=(comment||"").slice(0,500)||null;await sbPatch("user_tutorial_outcomes","id=eq."+outcomeId,payload,token);}
// Loads the user's skill_score from their profile row. Updated automatically by trigger after each outcome.
async function loadSkill(){if(!token||!user)return;const rows=await sbGet("profiles","select=skill_score&id=eq."+user.id,token);if(rows&&rows[0])setSkill(rows[0].skill_score);}

const loadHist=useCallback(async()=>{if(!token)return;const h=await sbGet("diagnosis_history","select=*&order=created_at.desc&limit=20",token);setHist(h||[]);},[token]);
useEffect(()=>{if(token){loadCars();loadHist();loadSkill();}else setLd(false);},[token]);useEffect(()=>{if(!ld&&user&&!needsOnboarding&&cars.length===0&&hist.length===0&&skill!==null&&Number(skill)===1){setNeedsOnboarding(true);}},[ld,cars,hist,skill,user]);
async function addCar(car){try{await sbPost("user_cars",{user_id:user.id,vehicle_id:car.vehicle_id},token);}catch(e){}await loadCars();setScr(null);}
async function remCar(id){await sbDel("user_cars","id=eq."+id,token);const nc=cars.filter(c=>c.id!==id);setCars(nc);if(ac?.id===id)setAc(nc[0]||null);}
async function loadParts(fid,eid){const fp=await sbGet("fault_parts","select=*,parts(*)&fault_id=eq."+fid,token);const pf=await sbGet("part_fitments","select=part_id&engine_id=eq."+eid,token);const fi=new Set((pf||[]).map(x=>x.part_id));setParts((fp||[]).filter(x=>fi.has(x.part_id)).map(x=>x.parts));}
async function handleRes(r,syms){setRes(r);setScr("results");setFb({});setLastHistId(null);setTut(null);setTutAvailable(false);setTutOptions([]);setExitFbShown(false);setShowExitPopup(false);if(r.length>0&&ac){loadParts(r[0].fault_id,ac.engine_id);checkTutorial(r[0].fault_id,ac.engine_id);if(hist.length>=20){await sbDel("diagnosis_history","id=eq."+hist[hist.length-1].id,token);}const hRes=await sbPost("diagnosis_history",{user_id:user.id,vehicle_id:ac.vehicle_id,engine_id:ac.engine_id,symptoms:syms||[],answers:{},top_fault_name:r[0].name_sk,top_fault_severity:r[0].severity,top_fault_score:r[0].suspicion_score,all_results:r},token);if(hRes&&hRes.length>0)setLastHistId(hRes[0].id);loadHist();}}
async function sendFb(fid,fn,rt,cmt){await sbPost("diagnosis_feedback",{user_id:user.id,fault_id:fid,fault_name:fn,rating:rt,comment:cmt||null,diagnosis_history_id:lastHistId||null},token);setFb(p=>({...p,[fid]:rt}));}

function TutListScr(){const[tutListLocal,setTutListLocal]=useState(null);const[err,setErr]=useState(null);useEffect(()=>{let alive=true;(async()=>{try{const list=await listAllTutorials(token);if(!alive)return;setTutListLocal(list||[]);}catch(e){if(!alive)return;setErr(String(e&&e.message||e));setTutListLocal([]);}})();return()=>{alive=false;};},[]);const isLoading=tutListLocal===null&&!err;const list=tutListLocal||[];return(<div style={{flex:1,overflowY:"auto",paddingBottom:100}} className="fade-in"><div style={{padding:"16px 20px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><button onClick={()=>setScr(null)} style={{width:36,height:36,borderRadius:18,background:K.chip,border:"none",display:"flex",alignItems:"center",justifyContent:"center",color:K.text}}><I name="chevronLeft" size={18}/></button><div style={{fontSize:17,fontWeight:600,letterSpacing:-0.3}}>DIY návody</div><div style={{width:36}}/></div>{DEV_PREVIEW_TUTORIALS&&<div style={{margin:"0 16px 12px",padding:"8px 12px",background:K.warning+"18",border:"1px solid "+K.warning+"33",borderRadius:10,fontSize:12,color:K.warning,fontWeight:600,textAlign:"center"}}>⚠ Náhľad — vrátane konceptov (draft). V ostrej verzii uvidia užívatelia len overené (live).</div>}{!isLoading&&!err&&<div style={{padding:"4px 20px 12px"}}><div style={{fontSize:13,color:K.textMuted,lineHeight:1.45}}>{list.length} {list.length===1?"návod":(list.length<5?"návody":"návodov")} v databáze. Klepni na ktorýkoľvek pre náhľad.</div></div>}{err?<div style={{padding:"40px 20px",textAlign:"center"}}><div style={{fontSize:15,fontWeight:600,color:K.danger,marginBottom:8}}>Chyba pri načítaní</div><div style={{fontSize:12,color:K.textMuted,fontFamily:"monospace"}}>{err}</div></div>:isLoading?<div style={{padding:"40px 20px",textAlign:"center",color:K.textMuted,fontSize:14}}>Načítavam…</div>:list.length===0?<div style={{padding:"40px 20px",textAlign:"center",color:K.textMuted}}><I name="wrench" size={48} color={K.textSubtle}
